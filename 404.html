<!DOCTYPE html>
<html lang="en-GB">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #080b12; --surface: #0f1420; --border: #1e2536; --text: #e2e8f0; --text-dim: #94a3b8; --text-muted: #475569; --mint: #6ee7b7; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 17px; line-height: 1.75; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
    nav { position: sticky; top: 0; z-index: 100; background: rgba(8,11,18,0.85); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: 'DM Sans', sans-serif; font-weight: 700; font-size: 18px; text-decoration: none; color: var(--text); letter-spacing: -0.02em; }
    .nav-logo span { color: var(--mint); }
    .nav-cta { background: var(--mint); color: #080b12; font-weight: 600; font-size: 13px; padding: 8px 18px; border-radius: 8px; text-decoration: none; transition: opacity 0.2s; }
    .nav-cta:hover { opacity: 0.85; }
    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 64px 24px; }
    .error-wrap { text-align: center; max-width: 520px; }
    .error-code { font-family: 'Instrument Serif', Georgia, serif; font-size: 96px; line-height: 1; color: var(--mint); opacity: 0.3; margin-bottom: 16px; }
    h1 { font-family: 'Instrument Serif', Georgia, serif; font-size: 32px; line-height: 1.2; margin-bottom: 16px; }
    p { color: var(--text-dim); margin-bottom: 32px; }
    .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
    .links a { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 20px; color: var(--text-dim); text-decoration: none; font-size: 15px; transition: border-color 0.2s, color 0.2s; }
    .links a:hover { border-color: rgba(110,231,183,0.4); color: var(--mint); }
    footer { border-top: 1px solid var(--border); padding: 32px 24px; text-align: center; font-size: 13px; color: var(--text-muted); }
    footer a { color: var(--text-muted); text-decoration: none; }
    footer a:hover { color: var(--mint); }
  </style>
